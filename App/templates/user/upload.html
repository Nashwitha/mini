{% extends 'user/userbase.html' %}
{% block title %}Upload Financial Data{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-cloud-arrow-up text-primary" style="font-size: 3rem;"></i>
                        <h2 class="h4 mt-2">Upload Statements</h2>
                        <p class="text-muted small">Select a file to sync with your wealth tracker.</p>
                    </div>

                    <form method="POST" enctype="multipart/form-data" class="needs-validation">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label for="fileUpload" class="form-label fw-bold">Select File</label>
                            <input type="file" 
                                   name="file" 
                                   id="fileUpload" 
                                   class="form-control form-control-lg" 
                                   required>
                            <div class="form-text mt-2">
                                Supported formats: .csv, .xlsx, .pdf
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                                <span class="me-2">Confirm Upload</span>
                                <i class="bi bi-check-circle"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
